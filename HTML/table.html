<!DOCTYPE html>
<html lang="en">
<head>
    <title>My First HTML Page</title>
</head>

<body style="text-align: center;">

    <h1 style="color: blue;">
        HTML TABLE
    </h1>

    <table border="1" cellpadding="10px" cellspacing="5px" align="center" style="color: white; background-color: gray;">
        <caption style="font-size: 20px; font-weight: bold;"> Network Types </caption>
        <thead>
            <tr style="background-color: red;">
                <th> First </th>
                <th> Second </th>
                <th> Third </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td> LAN </td>
                <td> WAN </td>
                <td> MAN </td>
            </tr>
            <tr>
                <td> N1 </td>
                <td> N2 </td>
                <td> N3 </td>
            </tr>
            <tr>
                <td> 10 </td>
                <td> 20 </td>
                <td> 30 </td>
            </tr>
            </tbody>
    </table>
    

    <table border="1">
        <caption>Tables of Fruits</caption>
        <thead>
            <tr>
                <th> Fruits </th>
                <th> Price </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td> Apple </td>
                <td> 100 </td>
            </tr>
            <tr>
                <td> Banana </td>
                <td> 50 </td>
            </tr>
            <tr>
                <td> Orange </td>
                <td> 80 </td>
            </tr>
    </table>
</body>
</html>
