<!DOCTYPE html>
<html>
<head>
    <title>Subscription Form</title>
</head>

<body>

<h2>Subscribe</h2>

<form action="http://abc.com" method="post">

<label>Name</label><br>
<input type="text"><br><br>

<label>Email</label><br>
<input type="email"
       placeholder="Enter your email"><br><br>

<label>Address</label><br>
<textarea rows="4" cols="30"></textarea>

<br><br>

<label>Country</label><br>

<select>
    <option>India</option>
    <option>USA</option>
    <option>Canada</option>
    <option>Australia</option>
</select>

<br><br>

<label>Age</label><br>

<input type="radio" name="age"> Below 18

<input type="radio" name="age">18-35

<input type="radio" name="age">Above 35

<br><br>

<input type="submit" value="Submit">

</form>

</body>
</html>
