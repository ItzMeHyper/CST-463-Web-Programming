<!--[KTU May 2025 - 6 marks]
Create an HTML5 document containing an ordered list of three items—ice
cream, soft serve and frozen yogurt. Each ordered list should contain a
nested,unordered list of your favorite flavors. Provide three flavors in each
unordered list.-->


<!DOCTYPE html>
<html>
<head>
    <title>Nested List</title>
</head>

<body>

<h2>Favourite Frozen Desserts</h2>

<ol>

    <li>
        Ice Cream
        <ul>
            <li>Vanilla</li>
            <li>Chocolate</li>
            <li>Strawberry</li>
        </ul>
    </li>

    <li>
        Soft Serve
        <ul>
            <li>Mango</li>
            <li>Butterscotch</li>
            <li>Black Currant</li>
        </ul>
    </li>

    <li>
        Frozen Yogurt
        <ul>
            <li>Blueberry</li>
            <li>Kiwi</li>
            <li>Peach</li>
        </ul>
    </li>

</ol>

</body>
</html>
