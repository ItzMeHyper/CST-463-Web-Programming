<!DOCTYPE html>
<html>
<head>
    <title>Job Registration Form</title>
</head>

<body>

<h2>Job Registration Form</h2>

<form action="#" method="post">

    <!-- Name -->
    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name">
    <br><br>

    <!-- Address -->
    <label for="address">Address:</label><br>
    <textarea id="address" name="address" rows="4" cols="30"></textarea>
    <br><br>

    <!-- Email -->
    <label for="email">E-mail:</label><br>
    <input type="email" id="email" name="email">
    <br><br>

    <!-- Contact Number -->
    <label for="phone">Contact Number:</label><br>
    <input type="tel" id="phone" name="phone">
    <br><br>

    <!-- Date of Birth -->
    <label for="dob">Date of Birth:</label><br>
    <input type="date" id="dob" name="dob">
    <br><br>

    <!-- Sex -->
    <label>Sex:</label><br>

    <input type="radio" id="male" name="sex" value="Male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="sex" value="Female">
    <label for="female">Female</label>

    <input type="radio" id="other" name="sex" value="Other">
    <label for="other">Other</label>

    <br><br>

    <!-- Area of Interest -->
    <label>Area of Interest:</label><br>

    <input type="checkbox" id="web" name="interest" value="Web Development">
    <label for="web">Web Development</label><br>

    <input type="checkbox" id="python" name="interest" value="Python">
    <label for="python">Python</label><br>

    <input type="checkbox" id="ai" name="interest" value="Artificial Intelligence">
    <label for="ai">Artificial Intelligence</label><br>

    <input type="checkbox" id="cyber" name="interest" value="Cyber Security">
    <label for="cyber">Cyber Security</label>

    <br><br>

    <!-- Experience -->
    <label for="experience">Experience:</label><br>

    <select id="experience" name="experience">
        <option value="">--Select Experience--</option>
        <option>Fresher</option>
        <option>1-2 Years</option>
        <option>3-5 Years</option>
        <option>More than 5 Years</option>
    </select>

    <br><br>

    <!-- Buttons -->
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>
