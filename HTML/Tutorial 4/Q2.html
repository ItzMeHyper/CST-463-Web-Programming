<!--
Create an HTML5 document containing a table with the following structure:
- A header row spanning two columns
- A row with column headers for "Flower Name" and "Colour"
- Three rows of data for different flowers and their colors.-->

<!DOCTYPE html>
<html>
<head>
    <title>Flower Show</title>
</head>

<body>

<table border="1" cellspacing="0" cellpadding="8" align="center">

    <tr>
        <th colspan="2">Flower Show</th>
    </tr>

    <tr>
        <th>Flower Name</th>
        <th>Colour</th>
    </tr>

    <tr>
        <td>Red Rose</td>
        <td>Red</td>
    </tr>

    <tr>
        <td>White Rose</td>
        <td rowspan="2">White</td>
    </tr>

    <tr>
        <td>Jasmine</td>
    </tr>

    <tr>
        <td>Sunflower</td>
        <td>Yellow</td>
    </tr>

</table>

</body>
</html>
