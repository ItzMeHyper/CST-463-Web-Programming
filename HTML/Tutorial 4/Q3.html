<!--Write HTML code to create a table whose structure is given below. Insert
any text of your choice in the table cells. The first row is considered to be
containing a heading. The background colour for the table should be red,
and the text in the cells should all be center aligned.-->

<!DOCTYPE html>
<html>
<head>
    <title>Table Structure</title>
</head>

<body>

<table border="1"
       cellpadding="20"
       cellspacing="0"
       align="center">

<tr align="center">
    <th>Heading 1</th>
    <th>Heading 2</th>
</tr>

<tr align="center">
    <td>Row 1</td>
    <td>Row 1</td>
</tr>

<tr align="center">
    <td rowspan="4">Merged Cell</td>
    <td>Row 2</td>
</tr>

<tr align="center">
    <td>Row 3</td>
</tr>

<tr align="center">
    <td>Row 4</td>
</tr>

<tr align="center">
    <td>Row 5</td>
</tr>

<tr align="center">
    <td>Last Row</td>
    <td>Last Cell</td>
</tr>

</table>

</body>
</html>
