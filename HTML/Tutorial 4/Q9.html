<!DOCTYPE html>
<html>
<head>
    <title>Training Feedback Form</title>
</head>

<body>

<h2>Training Feedback Form</h2>

<form action="#" method="post">

    <!-- Name -->
    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name">
    <br><br>

    <!-- Email -->
    <label for="email">Email ID:</label><br>
    <input type="email" id="email" name="email" required>
    <br><br>

    <!-- Gender -->
    <label>Gender:</label><br>
    <input type="checkbox" id="male" name="gender" value="Male">
    <label for="male">Male</label>

    <input type="checkbox" id="female" name="gender" value="Female">
    <label for="female">Female</label>

    <input type="checkbox" id="other" name="gender" value="Other">
    <label for="other">Other</label>
    <br><br>

    <!-- Area of Training -->
    <label for="training">Area of Training:</label><br>
    <select id="training" name="training">
        <option value="">--Select--</option>
        <option>Web Programming</option>
        <option>Python Programming</option>
        <option>Data Science</option>
        <option>Cyber Security</option>
    </select>
    <br><br>

    <!-- Comments -->
    <label for="comments">Comments:</label><br>
    <textarea id="comments" name="comments" rows="5" cols="35"></textarea>
    <br><br>

    <!-- Overall Rating -->
    <label for="rating">Overall Rating:</label><br>
    <select id="rating" name="rating">
        <option value="">--Select Rating--</option>
        <option>Excellent</option>
        <option>Very Good</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
    </select>
    <br><br>

    <!-- Submit -->
    <input type="submit" value="Submit">

</form>

</body>
</html>
