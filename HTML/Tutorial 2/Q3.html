<!DOCTYPE html>
<html>
<head>
    <title>Nested List</title>
</head>
<body>

<h2>Ordered List inside an Unordered List</h2>

<ul>

    <li>Fruits
        <ol>
            <li>Apple</li>
            <li>Banana</li>
            <li>Cherry</li>
            <li>Date</li>
        </ol>
    </li>

    <li>Vegetables
        <ol>
            <li>Carrot</li>
            <li>Broccoli</li>
            <li>Spinach</li>
            <li>Potato</li>
        </ol>
    </li>

    <li>Dairy
        <ol>
            <li>Milk</li>
            <li>Cheese</li>
            <li>Yogurt</li>
            <li>Butter</li>
        </ol>
    </li>

</ul>

</body>
</html>
